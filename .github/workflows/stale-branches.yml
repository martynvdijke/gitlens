name: Stale Branch Cleanup

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete stale branches
        uses: fpicalausa/delete-stale-branches@v1
        with:
          dry-run: false
          days-before-delete: 60
          ignore-branches: 'main,master,develop'
          operations-per-run: 100
          default-recipients: ''
          delete-squashed: true
          delete-rebasing: true
