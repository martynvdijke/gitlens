{{define "trends_tab"}}
<div data-trends-init>
    <h2 class="h4 fw-semibold mb-3">Trends</h2>

    <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
        <select id="trends-range" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:auto">
            <option value="24h">Last 24 hours</option>
            <option value="7d" selected>Last 7 days</option>
            <option value="30d">Last 30 days</option>
            <option value="90d">Last 90 days</option>
            <option value="all">All time</option>
        </select>
        <select id="trends-repo" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:auto">
            <option value="">All Repos</option>
            {{range .Repos}}
            <option value="{{.ID}}">{{.FullName}}</option>
            {{end}}
        </select>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="card border-secondary p-3">
                <h6 class="fw-semibold mb-2 text-secondary small text-uppercase">Commit Types Over Time</h6>
                <canvas id="commitTrendChart" height="200"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-secondary p-3">
                <h6 class="fw-semibold mb-2 text-secondary small text-uppercase">Workflow Pass Rate</h6>
                <canvas id="workflowTrendChart" height="200"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-secondary p-3">
                <h6 class="fw-semibold mb-2 text-secondary small text-uppercase">Average Lead Time</h6>
                <canvas id="leadTimeTrendChart" height="200"></canvas>
            </div>
        </div>
        <div class="col-12">
            <div class="card border-secondary p-3">
                <h6 class="fw-semibold mb-2 text-secondary small text-uppercase">Release Frequency</h6>
                <canvas id="releaseTrendChart" height="120"></canvas>
            </div>
        </div>
    </div>
</div>
{{end}}
