root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/gitoverviewer"
  cmd = "go build -o ./tmp/gitoverviewer ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "ent"]
  exclude_file = []
  exclude_regex = [".*_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "css"]

[log]
  level = "info"
  time_format = "2006-01-02 15:04:05"

[color]
  app = ""
  build = "yellow"
  main = "green"
  runner = "cyan"
  watcher = "magenta"

[misc]
  clean_on_exit = true
